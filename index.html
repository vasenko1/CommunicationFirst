<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Связь</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <h1>Связь</h1>

    <p class="status">
      <span id="statusDot">🟢</span>
      <span id="statusText">Готово</span>
    </p>

    <button id="startCallBtn" type="button">Позвонить</button>

    <section id="inviteBox" class="invite" hidden>
      <label for="inviteUrl">Ссылка приглашения</label>
      <div class="invite-row">
        <input id="inviteUrl" type="text" readonly>
        <button id="copyInviteBtn" type="button">Копировать</button>
      </div>
    </section>

    <p class="footer">MVP • Голосовой звонок</p>
  </main>

  <section class="debug-panel" aria-label="Отладка">
    <div class="debug-panel__header">
      <div class="debug-panel__title">Отладка</div>
      <div class="debug-panel__actions">
        <button id="copyDebugBtn" type="button" class="debug-btn">Копировать журнал</button>
      </div>
    </div>
    <pre id="debugLog">Ожидание событий...</pre>
  </section>

  <audio id="remoteAudio" autoplay playsinline></audio>
  <script type="module" src="app.js"></script>
</body>
</html>
